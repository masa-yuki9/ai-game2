<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>game_final</title>
    <style>
      :root {
        --bg: #0c1108;
        --c0: #18210f;
        --c1: #4b6127;
        --c2: #8ea55a;
        --c3: #ced78d;
        --c4: #e8efb7;
        --road: #dfe6b5;
        --panel: #cad486;
        --shadow: #738646;
        --orange: #ef8938;
        --face: #f7dfc0;
        --pink: #d63f8a;
        --red: #e35353;
        --yellow: #f0cf2f;
        --wall: #5d6b36;
        --cheek: #efb176;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        color: var(--c0);
        font-family: "MS Gothic", "Courier New", monospace;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px;
      }
      .wrap {
        width: min(1240px, calc(100vw - 20px));
        height: min(708px, calc(100vh - 20px));
        display: grid;
        grid-template-columns: minmax(0, 1fr) 304px;
        gap: 14px;
        min-height: 0;
      }
      .gameWrap,
      .panel {
        background: var(--panel);
        border: 4px solid var(--c0);
        box-shadow:
          inset 3px 3px 0 var(--c4),
          inset -3px -3px 0 var(--c2);
        min-height: 0;
      }
      .gameWrap {
        padding: 10px;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }
      .title {
        align-self: center;
        margin-bottom: 10px;
        padding: 6px 18px;
        font-size: 17px;
        font-weight: bold;
        letter-spacing: 1px;
        border: 4px solid var(--c0);
        background: var(--c3);
        box-shadow:
          inset 3px 3px 0 var(--c4),
          inset -3px -3px 0 var(--c2);
      }
      canvas {
        width: 100%;
        height: 100%;
        display: block;
        border: 4px solid var(--c0);
        background: var(--c4);
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        min-height: 0;
      }
      .side {
        display: flex;
        flex-direction: column;
        gap: 5px;
        min-height: 0;
      }
      .panel {
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .panelTitle {
        flex: 0 0 auto;
        text-align: center;
        padding: 3px 8px;
        font-size: 13px;
        font-weight: bold;
        letter-spacing: 1px;
        border-bottom: 4px solid var(--c0);
        background: rgba(255, 255, 255, 0.08);
      }
      .panelBody {
        flex: 1 1 auto;
        padding: 10px 12px;
        font-size: 15px;
        line-height: 1.62;
        white-space: pre-line;
        overflow: hidden;
      }
      .statusBody {
        font-size: 16px;
        line-height: 1.78;
      }
      .goalBody {
        min-height: 76px;
        font-size: 14px;
        line-height: 1.8;
        padding-top: 11px;
        padding-bottom: 11px;
      }
      .locationBody {
        min-height: 44px;
        font-size: 15px;
        line-height: 1.3;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-weight: bold;
      }
      .eventPanel {
        flex: 0 0 205px;
        min-height: 205px;
      }
      .statusBody {
        font-size: 12px;
        line-height: 1.25;
        padding: 6px 8px;
      }

      .goalBody {
        min-height: 54px;
        font-size: 11px;
        line-height: 1.25;
        padding: 5px 8px;
        overflow: hidden;
      }

      .locationBody {
        min-height: 30px;
        font-size: 12px;
        line-height: 1.2;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-weight: bold;
      }

      .eventBody {
        min-height: 92px;
        max-height: 92px;
        font-size: 12px;
        line-height: 1.3;
        padding: 7px 10px;
        overflow: auto;
      }

      .logBody {
        min-height: 102px;
        font-size: 11px;
        line-height: 1.25;
        overflow: auto;
      }

      .small {
        font-size: 10px;
        line-height: 1.2;
      }
      .resetWrap {
        padding: 10px;
        padding-top: 0;
      }
      .resetBtn {
        border: 4px solid var(--c0);
        text-align: center;
        background: var(--c3);
        box-shadow:
          inset 3px 3px 0 var(--c4),
          inset -3px -3px 0 var(--c2);
      }
      .buttons button {
        padding: 4px 8px;
        font-size: 12px;
        line-height: 1.15;
        min-height: 24px;
      }

      .buttons {
        margin: 0 8px 6px;
      }
      /* げんざいち欄は提出画面では不要なので非表示 */
      .panel:has(#locationText) {
        display: none;
      }

      /* イベント欄を大きくして、3ボタンを確実に表示 */
      .eventPanel {
        flex: 0 0 245px;
        min-height: 245px;
      }

      .eventBody {
        min-height: 128px;
        max-height: 128px;
        font-size: 12px;
        line-height: 1.3;
        padding: 8px 10px;
        overflow: auto;
      }

      /* ログは少しだけ圧縮 */
      .logBody {
        min-height: 76px;
        font-size: 11px;
        line-height: 1.25;
        overflow: auto;
      }
      @media (max-width: 1050px) {
        .wrap {
          grid-template-columns: 1fr;
          height: min(940px, calc(100vh - 20px));
        }
        .side {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 10px;
        }
        .eventPanel {
          grid-column: 1/-1;
        }
      }

/* ===== スマホ操作ボタン（提出用） ===== */
#touchControls {
  display: none;
}

@media (max-width: 700px) {
  html,
  body {
    height: auto;
    min-height: 100%;
    overflow: auto;
  }

  body {
    align-items: flex-start;
    padding: 8px 8px 190px;
  }

  .wrap {
    width: 100%;
    height: auto;
    display: block;
  }

  .gameWrap {
    width: 100%;
    height: auto;
    margin-bottom: 10px;
  }

  canvas {
    width: 100%;
    height: auto;
    aspect-ratio: 760 / 560;
  }

  .side {
    display: block;
  }

  .panel {
    margin-bottom: 8px;
  }

  .eventPanel {
    min-height: 210px;
  }

  .eventBody {
    min-height: 116px;
    max-height: 116px;
  }

  #touchControls {
    position: fixed;
    left: 50%;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 68px);
    transform: translateX(-50%);
    z-index: 9999;
    display: flex;
    align-items: flex-end;
    gap: 18px;
    padding: 8px 10px;
    background: rgba(12, 17, 8, 0.72);
    border: 3px solid #18210f;
    border-radius: 16px;
    box-shadow: 0 4px 0 rgba(0, 0, 0, 0.35);
  }

  #touchControls .dpad {
    display: grid;
    grid-template-columns: 52px 52px 52px;
    grid-template-rows: 52px 52px;
    gap: 5px;
  }

  #touchControls button {
    width: 52px;
    height: 52px;
    font-size: 22px;
    font-family: "MS Gothic", "Courier New", monospace;
    font-weight: bold;
    color: #18210f;
    background: #e8efb7;
    border: 3px solid #18210f;
    border-radius: 10px;
    box-shadow: inset 2px 2px 0 #ffffff, inset -2px -2px 0 #8ea55a;
    touch-action: manipulation;
  }

  #touchControls .up {
    grid-column: 2;
    grid-row: 1;
  }

  #touchControls .left {
    grid-column: 1;
    grid-row: 2;
  }

  #touchControls .down {
    grid-column: 2;
    grid-row: 2;
  }

  #touchControls .right {
    grid-column: 3;
    grid-row: 2;
  }

  #touchControls .actions {
    display: grid;
    grid-template-columns: 78px 78px;
    gap: 6px;
  }

  #touchControls .actions button {
    width: 78px;
    font-size: 15px;
  }
}

    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="gameWrap">
        <div class="title">8bit まちぼうけん</div>
        <canvas id="game" width="760" height="560"> </canvas>
      </section>
      <aside class="side">
        <section class="panel">
          <div class="panelTitle">STATUS</div>
          <div class="panelBody statusBody">
            <div id="hpText">HP　10/10</div>
            <div id="moodText">きぶん　100</div>
            <div id="moneyText">おかね　0G</div>
            <div id="itemText">もちもの　なし</div>
            <div id="musicText">おんがく　ON</div>
          </div>
        </section>
        <section class="panel">
          <div class="panelTitle">もくてき</div>
          <div class="panelBody goalBody" id="goalText">
            ひろばで かぎを ひろって えきいんに わたそう
          </div>
        </section>
        <section class="panel">
          <div class="panelTitle">げんざいち</div>
          <div class="panelBody locationBody" id="locationText">
            した どおり
          </div>
        </section>
        <section class="panel eventPanel">
          <div class="panelTitle">イベント</div>
          <div class="panelBody eventBody" id="eventText">
            まちに ついた。 やじるしキーで あるこう。
          </div>
          <div class="buttons">
            <button id="talkBtn" disabled>はなす / Enter</button>
            <button id="runBtn" disabled>にげる / B</button>
            <button id="ignoreBtn" disabled>むしする / Esc</button>
          </div>
        </section>
        <section class="panel">
          <div class="panelTitle">ログ</div>
          <div class="panelBody logBody" id="logText">
            まちに ついた。 やじるしキーで あるこう。
          </div>
        </section>
        <section class="panel">
          <div class="panelTitle">そうさ</div>
          <div class="panelBody small">
            やじるしキー / WASD：いどう Enter：はなす B：にげる Esc：むしする
            M：おんがく ON/OFF
          </div>
          <div class="resetWrap">
            <button class="resetBtn" id="resetBtn">さいしょから</button>
          </div>
        </section>
      </aside>
    </div>
    <script>
      const canvas = document.getElementById("game"),
        ctx = canvas.getContext("2d");
      ctx.imageSmoothingEnabled = false;
      const hpText = document.getElementById("hpText"),
        moodText = document.getElementById("moodText"),
        moneyText = document.getElementById("moneyText"),
        itemText = document.getElementById("itemText"),
        musicText = document.getElementById("musicText"),
        goalText = document.getElementById("goalText"),
        locationText = document.getElementById("locationText"),
        eventText = document.getElementById("eventText"),
        logText = document.getElementById("logText"),
        talkBtn = document.getElementById("talkBtn"),
        runBtn = document.getElementById("runBtn"),
        ignoreBtn = document.getElementById("ignoreBtn"),
        resetBtn = document.getElementById("resetBtn");
      const C = {
        dark: "#1b2310",
        line: "#1b2310",
        mid: "#8ea45a",
        mid2: "#9db466",
        light: "#cfd88f",
        bright: "#e8efb7",
        road: "#dfe7b7",
        panel: "#cad486",
        shadow: "#738546",
        orange: "#ef8938",
        face: "#f7dfc0",
        pink: "#d63f8a",
        red: "#df5353",
        yellow: "#f0cf2f",
        wall: "#5d6b36",
        cheek: "#efb176",
      };
      const TILE = 40,
        COLS = 18,
        ROWS = 13,
        OX = 20,
        OY = 20,
        MAP_W = COLS * TILE,
        MAP_H = ROWS * TILE;
      const walkable = Array.from(
        {
          length: ROWS,
        },
        () => Array(COLS).fill(false),
      );
      function inBounds(x, y) {
        return x >= 0 && y >= 0 && x < COLS && y < ROWS;
      }
      function fillWalk(x, y, w, h) {
        for (let yy = y; yy < y + h; yy++)
          for (let xx = x; xx < x + w; xx++)
            if (inBounds(xx, yy)) walkable[yy][xx] = true;
      }
      fillWalk(3, 2, 12, 2);
      fillWalk(8, 2, 2, 9);
      fillWalk(4, 6, 10, 2);
      fillWalk(2, 10, 13, 2);
      fillWalk(5, 4, 8, 5);
      fillWalk(1, 7, 5, 3);
      const buildings = [
        {
          x: 7,
          y: 0,
          w: 4,
          h: 2,
          label: "えき",
          type: "station",
        },
        {
          x: 1,
          y: 4,
          w: 3,
          h: 2,
          label: "みせ",
          type: "shop",
        },
        {
          x: 12,
          y: 4,
          w: 2,
          h: 2,
          label: "こうばん",
          type: "koban",
        },
        {
          x: 6,
          y: 8,
          w: 4,
          h: 3,
          label: "ビル",
          type: "office",
        },
      ];
      const benches = [
          {
            x: 1.4,
            y: 7.8,
            w: 1.5,
          },
          {
            x: 3.3,
            y: 8.3,
            w: 1.3,
          },
        ],
        bushes = [
          {
            x: 1.2,
            y: 8.8,
            w: 0.7,
          },
          {
            x: 4.2,
            y: 7.2,
            w: 0.8,
          },
        ];
      const npcs = [
        {
          id: "stationNpc",
          x: 8,
          y: 3,
          type: "station",
        },
        {
          id: "shopNpc",
          x: 5,
          y: 6,
          type: "shop",
        },
        {
          id: "policeNpc",
          x: 11,
          y: 6,
          type: "police",
        },
      ];
      const events = {
        partnerChoice: {
          id: "partnerChoice",
          intro:
            "まちへ でるまえに\nあいぼうを えらぼう。\n\nEnter：ねこ\nB：ブラックバード\nEsc：いっぬ",
          repeat:
            "あいぼうを えらぼう。\n\nEnter：ねこ\nB：ブラックバード\nEsc：いっぬ",
          labels: ["ねこ", "ブラックバード", "いぬ"],
          resolve(choice) {
            if (choice === "talk") {
              state.partner = "ねこ";
              state.flags.mouse = true;
              state.objective = "あいぼうと いっしょに\nかぎを さがそう";
              return "ねこ、きみに きめた！\nちゃとらでかわいい。";
            }

            if (choice === "run") {
              state.partner = "ブラックバード";
              state.flags.jewel = true;
              state.objective = "あいぼうと いっしょに\nかぎを さがそう";
              return "ブラックバード、きみに きめた！\nなまえが かっこいい。";
            }

            state.partner = "いっぬ";
            state.flags.canFindKey = true;
            state.objective = "あいぼうと いっしょに\nかぎを さがそう";
            return "いっぬ、きみに きめた！\nしっぽを ふって\nにおいを かぎはじめた。";
          },
        },
        key: {
          id: "key",
          x: 3,
          y: 8,
          intro: "ひろばに なにか ありそうだ。\nあいぼうと しらべてみよう。",
          repeat: "ひろばは もう しらべた。",
          resolve(choice) {
            if (choice !== "talk") {
              return "まだ しらべずに そのばを はなれた。";
            }

            if (!state.partner) {
              return "まず あいぼうを えらぼう。";
            }

            state.flags.searched = true;

            if (state.partner === "ねこ") {
              state.flags.mouse = true;
              if (!state.items.includes("ねずみ")) state.items.push("ねずみ");
              state.objective = "ねずみを みつけた\nでも かぎでは なさそうだ";
              return "ねこが くさむらを みつめた。\nねずみを みつけた！\nでも かぎでは なさそうだ。";
            }

            if (state.partner === "ブラックバード") {
              state.flags.jewel = true;
              if (!state.items.includes("ほうせき"))
                state.items.push("ほうせき");
              state.objective = "ほうせきを みつけた\nでも かぎでは なさそうだ";
              return "ブラックバードが ひかるものを つついた。\nほうせきを みつけた！\nでも かぎでは なさそうだ。";
            }

            if (state.partner === "いっぬ") {
              state.flags.key = true;
              if (!state.items.includes("かぎ")) state.items.push("かぎ");
              state.objective = "かぎを みつけた\nえきいんに わたそう";
              return "いっぬが においを たどった。\nかぎを みつけた！\nえきへ もどろう。";
            }

            return "なにも みつからなかった。";
          },
        },
        shopNpc: {
          id: "shopNpc",
          intro:
            "みせの ひとが こえを かけてきた。\n「きょうは いい ひだね！」",
          repeat: "みせの ひと「ラムネは あじわって たべなよ」",
          resolve(choice) {
            if (choice === "talk") {
              if (!state.npcReward.shopNpc) {
                state.npcReward.shopNpc = true;
                state.money += 10;
                state.mood = Math.min(120, state.mood + 3);
                if (!state.items.includes("ラムネ")) state.items.push("ラムネ");
                return "ラムネを もらった！\nおかねが 10G ふえた。\nきぶんも 3 あがった。";
              }
              return "みせの ひと「ラムネは あじわって たべなよ」";
            }
            if (choice === "run") return "あいさつだけして いそいで さった。";
            return "ちいさく えしゃくして とおりすぎた。";
          },
        },
        policeNpc: {
          id: "policeNpc",
          intro: "こうばんの ひとが みまわり している。",
          repeat: "こうばんの ひと「きをつけて あるくんだぞ」",
          resolve(choice) {
            if (choice === "talk") {
              if (!state.npcReward.policeNpc) {
                state.npcReward.policeNpc = true;
                state.mood = Math.min(120, state.mood + 5);
                return "「ひろばを みてみな」\nきぶんが 5 あがった。";
              }
              return "こうばんの ひと「きをつけて あるくんだぞ」";
            }
            if (choice === "run")
              return "なんとなく せなかを のばして さった。";
            return "しずかに すれちがった。";
          },
        },
        stationNpc: {
          id: "stationNpc",
          intro: "えきいんが こまった かおを している。",
          repeat: "えきいん「おとしものは みつかったかい？」",
          resolve(choice) {
            if (choice === "talk") {
              if (!state.flags.key)
                return "えきいん「ひろばで おとしものを したんだ…」";
              if (!state.flags.clear) {
                state.flags.clear = true;
                state.objective = "げーむ くりあ！";
                return "えきいんに かぎを わたした！\nまちの ひとが よろこんでいる。\nCLEAR!";
              }
              return "えきいん「ありがとう！ たすかったよ」";
            }
            if (choice === "run")
              return "えきいんを きにしつつ そのばを はなれた。";
            return "ようすを みて そのまま あるいた。";
          },
        },
      };
      const state = {
        x: 8,
        y: 10,
        px: 8,
        py: 10,
        fromX: 8,
        fromY: 10,
        toX: 8,
        toY: 10,
        moving: false,
        moveStart: 0,
        moveDuration: 260,
        step: 0,
        hp: 10,
        mood: 100,
        money: 0,
        items: [],
        activeEvent: null,
        currentLocation: "した どおり",
        objective: "ひろばで かぎを ひろって\nえきいんに わたそう",
        logs: ["まちに ついた。", "やじるしキーで あるこう。"],
        seenEvent: new Set(),
        flags: {
          key: false,
          clear: false,
          canFindKey: false,
          food: false,
          mouse: false,
          jewel: false,
          searched: false,
        },
        partner: null,
        npcReward: {
          shopNpc: false,
          policeNpc: false,
        },
      };
      let heldKeys = new Set(),
        lastHeldDir = null;
      function gx(x) {
        return OX + x * TILE;
      }
      function gy(y) {
        return OY + y * TILE;
      }
      function addLog(msg) {
        const lines = String(msg).split("\n").filter(Boolean);
        for (const line of lines) state.logs.unshift(line);
        state.logs = state.logs.slice(0, 5);
        logText.textContent = state.logs.join("\n");
      }
      function setEventButtonLabels(ev) {
        if (ev && ev.labels) {
          talkBtn.textContent = ev.labels[0];
          runBtn.textContent = ev.labels[1];
          ignoreBtn.textContent = ev.labels[2];
        } else {
          talkBtn.textContent = "はなす / Enter";
          runBtn.textContent = "にげる / B";
          ignoreBtn.textContent = "むしする / Esc";
        }
      }
      function setButtonsDisabled(dis) {
        talkBtn.disabled = dis;
        runBtn.disabled = dis;
        ignoreBtn.disabled = dis;
      }
      function openEventPanel(msg) {
        eventText.textContent = msg;
      }
      function closeEventPanel() {
        eventText.textContent = state.flags.clear
          ? "げーむ くりあ！\nさいしょからで もういちど あそべる。"
          : "なにも おきていない。\nまちを あるこう。";
        setEventButtonLabels(null);
        setButtonsDisabled(true);
      }
      function getItemText() {
        return state.items.length ? state.items.join(" / ") : "なし";
      }
      function updateUI() {
        hpText.textContent = `HP　${state.hp}
/10`;
        moodText.textContent = `きぶん　${state.mood}
`;
        moneyText.textContent = `おかね　${state.money}
G`;
        itemText.textContent = `もちもの　${getItemText()}
`;
        musicText.textContent = `おんがく　${audioEnabled ? "ON" : "OFF"}
`;
        goalText.textContent = state.flags.clear
          ? "げーむ くりあ！\nさいしょからで もういちど"

          if (e.key === "b" || e.key === "B") {
            e.preventDefault();
            handleEventChoice("run");
            return;
          }
        }
        if (e.key === "Enter") {
          e.preventDefault();
          talkToNearbyNpc();
          return;
        }
        if (e.key === "m" || e.key === "M") {
          e.preventDefault();
          toggleMusic();
          return;
        }
        const dir = getDirFromKey(e.key);
        if (!dir) return;
        e.preventDefault();
        heldKeys.add(dir.code);
        lastHeldDir = dir;
        if (!state.moving && !state.activeEvent && !state.flags.clear)
          tryMove(dir.dx, dir.dy);
      });
      document.addEventListener("keyup", (e) => {
        const dir = getDirFromKey(e.key);
        if (!dir) return;
        heldKeys.delete(dir.code);
      });
      talkBtn.addEventListener("click", () => handleEventChoice("talk"));
      runBtn.addEventListener("click", () => handleEventChoice("run"));
      ignoreBtn.addEventListener("click", () => handleEventChoice("ignore"));
      resetBtn.addEventListener("click", resetGame);
      resetGame();
      requestAnimationFrame(gameLoop);
    </script>

    <div id="touchControls" aria-label="スマホ操作ボタン">
      <div class="dpad">
        <button class="up" onclick="touchMove(0,-1)">↑</button>
        <button class="left" onclick="touchMove(-1,0)">←</button>
        <button class="down" onclick="touchMove(0,1)">↓</button>
        <button class="right" onclick="touchMove(1,0)">→</button>
      </div>
      <div class="actions">
        <button onclick="touchDecide()">決定</button>
        <button onclick="touchRun()">にげる</button>
        <button onclick="touchIgnore()">むし</button>
      </div>
    </div>

  </body>
</html>
